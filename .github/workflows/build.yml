name: Build ViCast-NIP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build ViCast (Release x64)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Restore NuGet packages
        run: nuget restore ViCast.sln

      - name: Build ViCast Solution
        run: msbuild ViCastService.sln /p:Configuration=Release /p:Platform=x64